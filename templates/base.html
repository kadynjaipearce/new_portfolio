<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title | default(value="Kadyn Pearce") }}</title>
    <meta name="description" content="Software Engineer specializing in Rust, C++, blockchain, and machine learning. Building high-performance systems.">
    <meta name="author" content="Kadyn Pearce">
    <link rel="canonical" href="https://kadynpearce.dev">
    
    <!-- Open Graph -->
    <meta property="og:title" content="{{ page_title | default(value='Kadyn Pearce - Software Engineer') }}">
    <meta property="og:description" content="Software Engineer specializing in Rust, C++, blockchain, and machine learning.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://kadynpearce.dev">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        primary: '#0A0A0A',
                        secondary: '#6B7280',
                        accent: '#2563EB',
                        success: '#10B981',
                        grid: '#E5E7EB',
                    },
                    animation: {
                        'blink': 'blink 1s step-end infinite',
                        'fade-in': 'fadeIn 0.5s ease-out',
                        'slide-up': 'slideUp 0.5s ease-out',
                    },
                    keyframes: {
                        blink: {
                            '0%, 100%': { opacity: '1' },
                            '50%': { opacity: '0' },
                        },
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                    },
                },
            },
        }
    </script>
    
    <!-- Custom Styles -->
    <style>
        /* Grid background pattern */
        .grid-bg {
            background-image: 
                linear-gradient(to right, #E5E7EB 1px, transparent 1px),
                linear-gradient(to bottom, #E5E7EB 1px, transparent 1px);
            background-size: 40px 40px;
        }
        
        /* Typing cursor */
        .typing-cursor::after {
            content: '|';
            animation: blink 1s step-end infinite;
            color: #2563EB;
            font-weight: 400;
        }
        
        /* Code block styling */
        pre {
            background: #1a1a1a;
            border-radius: 8px;
            padding: 1rem;
            overflow-x: auto;
        }
        
        code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.875rem;
        }
        
        pre code {
            color: #e5e7eb;
        }
        
        :not(pre) > code {
            background: #f3f4f6;
            padding: 0.125rem 0.375rem;
            border-radius: 4px;
            font-size: 0.875em;
        }
        
        /* Smooth scrolling */
        html {
            scroll-behavior: smooth;
        }
        
        /* Selection color */
        ::selection {
            background: #2563EB;
            color: white;
        }
        
        /* Number counter animation */
        .counter {
            font-variant-numeric: tabular-nums;
        }
    </style>
    
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    
    <!-- Alpine.js -->
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="font-sans text-primary bg-white antialiased">
    {% block content %}{% endblock %}
    
    <!-- Typing animation script -->
    <script>
        function typeWriter(element, words, speed = 100, pause = 2000) {
            let wordIndex = 0;
            let charIndex = 0;
            let isDeleting = false;
            
            function type() {
                const currentWord = words[wordIndex];
                
                if (isDeleting) {
                    element.textContent = currentWord.substring(0, charIndex - 1);
                    charIndex--;
                } else {
                    element.textContent = currentWord.substring(0, charIndex + 1);
                    charIndex++;
                }
                
                let typeSpeed = speed;
                
                if (!isDeleting && charIndex === currentWord.length) {
                    typeSpeed = pause;
                    isDeleting = true;
                } else if (isDeleting && charIndex === 0) {
                    isDeleting = false;
                    wordIndex = (wordIndex + 1) % words.length;
                    typeSpeed = 500;
                }
                
                setTimeout(type, isDeleting ? speed / 2 : typeSpeed);
            }
            
            type();
        }
        
        // Counter animation
        function animateCounter(element, target, duration = 2000) {
            let start = 0;
            const increment = target / (duration / 16);
            
            function update() {
                start += increment;
                if (start < target) {
                    element.textContent = Math.floor(start);
                    requestAnimationFrame(update);
                } else {
                    element.textContent = target;
                }
            }
            
            update();
        }
        
        // Initialize on page load
        document.addEventListener('DOMContentLoaded', () => {
            // Typing animation
            const typingElement = document.querySelector('[data-typing]');
            if (typingElement) {
                const words = JSON.parse(typingElement.dataset.typing);
                typeWriter(typingElement, words);
            }
            
            // Counter animations
            document.querySelectorAll('[data-counter]').forEach(el => {
                const target = parseInt(el.dataset.counter);
                const observer = new IntersectionObserver(entries => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            animateCounter(el, target);
                            observer.unobserve(el);
                        }
                    });
                });
                observer.observe(el);
            });
        });
    </script>
</body>
</html>
